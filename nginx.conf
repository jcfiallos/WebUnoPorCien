server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Esto permite que funcione el enrutamiento interno de React
        try_files $uri $uri/ /index.html;
    }

    # Redirigir errores de servidor a la página estática /50x.html
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
